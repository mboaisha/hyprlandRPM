general {
    lock_cmd = hyprlock
    unlock_cmd = pkill -USR1 hyprlock
    before_sleep_cmd = loginctl lock-session; sleep 2
    ignore_dbus_inhibit = false
}

# Screensaver activates + locks (xfce4-screensaver default: 5 min)
listener {
    timeout = 300
    on-timeout = hyprlock
}

# Display blank / DPMS off (power-manager "Blank after" on AC: 10 min)
listener {
    timeout = 600
    on-timeout = sleep 1 && hyprctl dispatch 'hl.dsp.dpms({ action = "disable" })'
    on-resume = sleep 1 && hyprctl dispatch 'hl.dsp.dpms({ action = "enable" })'
}

# System suspend (power-manager inactivity on AC: 15 min)
listener {
    timeout = 900
    on-timeout = systemctl suspend
}